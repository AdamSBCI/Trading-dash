  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e1117; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .header { padding: 20px 24px 0; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 800; color: #fff; }
    .header span { font-size: 13px; color: #666; }

    .ticker-tape { width: 100%; margin-top: 12px; }

    .container { padding: 0 24px 40px; }

    .section-title {
      font-size: 16px; font-weight: 700; color: #fff;
      margin: 28px 0 12px; border-left: 3px solid #2962ff;
      padding-left: 10px;
    }

    .row { display: grid; gap: 16px; }
    .row-2 { grid-template-columns: 2fr 1fr; }
    .row-equal { grid-template-columns: 1fr 1fr; }

    .card {
      background: #1e2130; border-radius: 12px;
      overflow: hidden; padding: 0;
    }
    .card-padded { padding: 16px; }

    .tabs { display: flex; gap: 0; border-bottom: 1px solid #2a2a3a; overflow-x: auto; }
    .tab {
      padding: 10px 18px; font-size: 13px; font-weight: 600;
      color: #888; cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: #2962ff; border-bottom-color: #2962ff; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .quote-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    @media (max-width: 900px) {
      .row-2 { grid-template-columns: 1fr; }
      .row-equal { grid-template-columns: 1fr; }
      .quote-grid { grid-template-columns: repeat(2, 1fr); }
    }

    hr { border: none; border-top: 1px solid #1e2130; margin: 8px 0; }
  </style>
</head>
